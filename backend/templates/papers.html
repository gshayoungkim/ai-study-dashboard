{% extends "base.html" %}
{% block title %}논문 게시판{% endblock %}
{% block content %}
<div class="papers-page">
    <h1>📄 우리가 관심있는 논문</h1>
    
    <!-- 논문 등록 폼 -->
    <div class="paper-form-container">
        <h2>논문 공유하기</h2>
        <form id="paper-form">
            <div class="form-group">
                <label for="title">제목 *</label>
                <input type="text" id="title" name="title" required placeholder="논문 제목을 입력하세요">
            </div>
            
            <div class="form-group">
                <label for="author">작성자 *</label>
                <input type="text" id="author" name="author" required placeholder="이름을 입력하세요">
            </div>
            
            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="5" placeholder="논문에 대한 간단한 설명을 입력하세요"></textarea>
            </div>
            
            <div class="form-group">
                <label for="link">URL</label>
                <input type="url" id="link" name="link" placeholder="https://arxiv.org/abs/...">
            </div>
            
            <div class="form-buttons">
                <button type="submit" class="btn-submit">📤 업로드</button>
                <button type="button" class="btn-cancel" onclick="resetForm()">❌ 취소</button>
            </div>
        </form>
    </div>
    
    <!-- 논문 목록 -->
    <div class="papers-container">
        <h2>공유된 논문 목록</h2>
        <div id="papers-list" class="papers-list">
            <!-- JavaScript로 동적 생성 -->
        </div>
    </div>
</div>

<style>
.papers-page {
    padding: 2rem;
    background: #f5f5f5;
    min-height: 100vh;
}

.papers-page h1 {
    text-align: center;
    margin-bottom: 2rem;
    color: #333;
}

.paper-form-container {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    max-width: 800px;
    margin: 0 auto 2rem;
}

.paper-form-container h2 {
    color: #667eea;
    margin-bottom: 1.5rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 0.5rem;
    color: #333;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 0.8rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
}

.form-buttons {
    display: flex;
    gap: 1rem;
}

.btn-submit,
.btn-cancel {
    flex: 1;
    padding: 1rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-submit {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

.btn-cancel {
    background: #f44336;
    color: white;
}

.btn-cancel:hover {
    background: #d32f2f;
}

.papers-container {
    max-width: 1200px;
    margin: 0 auto;
}

.papers-container h2 {
    color: #667eea;
    margin-bottom: 1.5rem;
}

.papers-list {
    display: grid;
    gap: 1.5rem;
}

.paper-card {
    background: white;
    padding: 1.5rem;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all 0.3s;
    cursor: pointer;
}

.paper-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.paper-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
}

.paper-title {
    font-size: 1.3rem;
    font-weight: bold;
    color: #333;
    margin: 0 0 0.5rem 0;
}

.paper-author {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
}

.paper-date {
    color: #999;
    font-size: 0.9rem;
}

.paper-content {
    color: #666;
    line-height: 1.6;
    margin-bottom: 1rem;
}

.paper-link {
    display: inline-block;
    color: #667eea;
    text-decoration: none;
    font-weight: bold;
}

.paper-link:hover {
    text-decoration: underline;
}

.empty-message {
    text-align: center;
    color: #999;
    padding: 3rem;
    font-size: 1.1rem;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadPapers();
    
    document.getElementById('paper-form').addEventListener('submit', function(e) {
        e.preventDefault();
        submitPaper();
    });
});

function loadPapers() {
    fetch('/api/papers')
        .then(res => res.json())
        .then(papers => {
            const listEl = document.getElementById('papers-list');
            
            if (papers.length === 0) {
                listEl.innerHTML = '<div class="empty-message">아직 공유된 논문이 없습니다. 첫 번째 논문을 공유해보세요!</div>';
                return;
            }
            
            listEl.innerHTML = papers.map(paper => `
                <div class="paper-card" onclick="location.href='/papers/${paper.id}'">
                    <div class="paper-header">
                        <div>
                            <h3 class="paper-title">${escapeHtml(paper.title)}</h3>
                            <div class="paper-author">📝 ${escapeHtml(paper.author || '익명')}</div>
                            <span class="paper-date">${formatDate(paper.created_at)}</span>
                        </div>
                    </div>
                    ${paper.content ? `<p class="paper-content">${escapeHtml(paper.content)}</p>` : ''}
                    ${paper.link ? `<a href="${escapeHtml(paper.link)}" target="_blank" class="paper-link" onclick="event.stopPropagation()">🔗 논문 보기</a>` : ''}
                </div>
            `).join('');
        })
        .catch(err => console.error('[ERROR] 논문 목록 로드 실패:', err));
}

function submitPaper() {
    const title = document.getElementById('title').value;
    const author = document.getElementById('author').value;
    const content = document.getElementById('content').value;
    const link = document.getElementById('link').value;
    
    if (!title || !author) {
        alert('제목과 작성자는 필수입니다!');
        return;
    }
    
    fetch('/api/papers', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ title, author, content, link })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert('논문이 등록되었습니다!');
            resetForm();
            loadPapers();
        } else {
            alert('오류: ' + data.error);
        }
    })
    .catch(err => {
        console.error('[ERROR] 논문 등록 실패:', err);
        alert('논문 등록에 실패했습니다.');
    });
}

function resetForm() {
    document.getElementById('paper-form').reset();
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
